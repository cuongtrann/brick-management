version: '3.3'

services:
  db:
    image: postgres:16-alpine
    container_name: brick_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: brick_db
      POSTGRES_USER: brick_user
      POSTGRES_PASSWORD: brick_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brick_user -d brick_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brick_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://brick_user:brick_pass@db:5432/brick_db
      NODE_ENV: production
    ports:
      - "13000:3000"

volumes:
  pgdata:
    name: brick_pgdata
